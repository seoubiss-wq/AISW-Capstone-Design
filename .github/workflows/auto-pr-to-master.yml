name: Auto PR To Default Branch

on:
  push:
    branches:
      - "codex/**"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-and-enable-auto-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create or update pull request
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          HEAD_BRANCH: ${{ github.ref_name }}
        run: |
          pr_number="$(gh pr list \
            --base "$BASE_BRANCH" \
            --head "$HEAD_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [ -z "$pr_number" ]; then
            gh pr create \
              --base "$BASE_BRANCH" \
              --head "$HEAD_BRANCH" \
              --title "Auto-merge $HEAD_BRANCH into $BASE_BRANCH" \
              --body "This PR was created automatically after a push to \`$HEAD_BRANCH\`."

            pr_number="$(gh pr list \
              --base "$BASE_BRANCH" \
              --head "$HEAD_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number')"
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pr_number }}
        run: |
          if [ -z "$PR_NUMBER" ]; then
            echo "Pull request number is missing."
            exit 1
          fi

          if gh pr merge "$PR_NUMBER" --auto --squash; then
            echo "Auto-merge enabled for PR #$PR_NUMBER." >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "Auto-merge could not be enabled for PR #$PR_NUMBER."
              echo ""
              echo "Check whether:"
              echo "- Auto-merge is enabled in the repository settings."
              echo "- The default branch requires the CI checks you expect."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
